name: klip_mobile
description: "AI YouTube Clipper — Paste a YouTube URL, generate vertical short clips with embedded subtitles."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State management
  bloc: ^9.0.0
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Codegen annotations
  freezed_annotation: ^3.0.0
  json_annotation: ^4.12.0

  # Dependency injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Navigation
  go_router: ^14.8.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Networking
  dio: ^5.7.0

  # Video player
  media_kit: ^1.2.0
  media_kit_native_event_loop: ^1.0.0
  media_kit_video: ^1.2.0

  # UI
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0

  # Platform utilities
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  url_launcher: ^6.3.1

  # Formatting
  intl: ^0.20.2

  # Cupertino icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.14
  freezed: ^3.0.3
  injectable_generator: ^2.7.0
  json_serializable: ^6.9.4

  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  # TODO: Download Inter from https://fonts.google.com/specimen/Inter and add:
